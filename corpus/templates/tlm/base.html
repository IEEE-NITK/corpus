{% extends "base.html" %}

{% block title %}
| The Lazarus Missions
{% endblock %}

{% block dark_mode_toggle %}
{# Dark mode toggle hidden for TLM — overrides base.html block #}
{% endblock %}

{% block script %}
<script>
    document.addEventListener("DOMContentLoaded", async function () {
        await new Promise(r => setTimeout(r, 100));
        const themeButton = document.getElementById("dark-mode-button");
        if (themeButton) themeButton.remove();
        document.documentElement.setAttribute("data-theme", "tlm");
    });
</script>
{% endblock %}
